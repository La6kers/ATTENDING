# ============================================================
# ATTENDING AI - Azure App Service Deployment
# .github/workflows/azure-deploy.yml
#
# Deploys the Express backend + Vite React frontend as a
# single Docker container to Azure App Service.
#
# Trigger: Push to mockup-2 branch or manual dispatch
#
# Prerequisites (one-time Azure setup):
#   1. Create Azure App Service (Linux, Docker)
#   2. Create Azure Container Registry (ACR)
#   3. Set up GitHub secrets (see below)
#   4. Enable WebSocket in App Service config
# ============================================================

name: Deploy to Azure

on:
  push:
    branches: [mockup-2]
    paths:
      - 'attending-medical-ai/**'
      - '.github/workflows/azure-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  AZURE_WEBAPP_NAME: attending-ai
  ACR_NAME: attendingacr
  IMAGE_NAME: attending-ai/app

jobs:
  # ========================================================
  # BUILD & TEST
  # ========================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: attending-medical-ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: attending-medical-ai/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=apps/frontend
        env:
          VITE_API_URL: /api

      - name: Verify build output
        run: |
          if [ ! -f apps/frontend/dist/index.html ]; then
            echo "::error::Frontend build failed — dist/index.html not found"
            exit 1
          fi
          echo "Frontend build successful"
          ls -la apps/frontend/dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            attending-medical-ai/apps/frontend/dist/
          retention-days: 1

  # ========================================================
  # DOCKER BUILD & PUSH TO ACR
  # ========================================================
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: attending-medical-ai
          file: attending-medical-ai/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_URL=/api

  # ========================================================
  # DEPLOY TO AZURE APP SERVICE
  # ========================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: staging
      url: https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: staging
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Configure staging slot settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: staging
          app-settings-json: |
            [
              { "name": "NODE_ENV", "value": "production" },
              { "name": "PORT", "value": "8080" },
              { "name": "WEBSITES_PORT", "value": "8080" },
              { "name": "WEBSITES_ENABLE_APP_SERVICE_STORAGE", "value": "true" },
              { "name": "DOCKER_ENABLE_CI", "value": "true" }
            ]

      - name: Wait for staging to be ready
        run: |
          echo "Waiting for staging slot..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net/health/live" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging slot is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — status: $STATUS"
            sleep 10
          done
          echo "::error::Staging slot did not become ready in 5 minutes"
          exit 1

      - name: Smoke test staging
        run: |
          # Check health endpoint
          HEALTH=$(curl -s "https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net/api/health")
          echo "Health: $HEALTH"

          STATUS=$(echo "$HEALTH" | jq -r '.status')
          if [ "$STATUS" != "ok" ] && [ "$STATUS" != "degraded" ]; then
            echo "::error::Health check failed: $HEALTH"
            exit 1
          fi

          # Check frontend is served
          FRONTEND=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net/")
          if [ "$FRONTEND" != "200" ]; then
            echo "::error::Frontend not accessible (HTTP $FRONTEND)"
            exit 1
          fi

          echo "Smoke tests passed"

  # ========================================================
  # SWAP STAGING → PRODUCTION
  # ========================================================
  swap-to-production:
    name: Swap to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/mockup-2'
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging to production
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP || 'attending-rg' }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot staging \
            --target-slot production

      - name: Verify production
        run: |
          sleep 15
          HEALTH=$(curl -s "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health")
          echo "Production health: $HEALTH"
          STATUS=$(echo "$HEALTH" | jq -r '.status')
          if [ "$STATUS" != "ok" ] && [ "$STATUS" != "degraded" ]; then
            echo "::warning::Production health check returned: $STATUS"
          fi
