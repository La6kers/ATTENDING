<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTENDING AI - Enhanced Provider Portal</title>
    <style>
        /* CSS Variables & Base Styles */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --text-primary: #000000;
            --text-secondary: #1f2937;
            --bg-primary: rgba(255, 255, 255, 0.95);
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.1);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 20px;
            --border-radius-xl: 25px;
            --transition-base: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: var(--text-primary);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            color: var(--text-primary);
        }

        /* Utility Classes */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .gap-4 { gap: 16px; }
        .gap-5 { gap: 20px; }
        .gap-6 { gap: 24px; }
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .relative { position: relative; }
        .absolute { position: absolute; }
        .fixed { position: fixed; }
        .hidden { display: none; }
        .block { display: block; }
        .grid { display: grid; }
        .transition-base { transition: var(--transition-base); }

        /* Icon System */
        .icon { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; }
        .icon-sm { width: 16px; height: 16px; }
        .icon-lg { width: 24px; height: 24px; }

        /* Button System */
        .btn-base {
            padding: 10px 20px;
            border-radius: var(--border-radius-xl);
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-base);
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-base:focus {
            outline: 2px solid #667eea;
            outline-offset: 2px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .btn-small {
            padding: 6px 16px;
            font-size: 13px;
            border-radius: var(--border-radius-lg);
            border: 2px solid transparent;
            font-weight: normal;
        }

        .btn-outline {
            background: white;
            border-color: #e5e7eb;
            color: var(--text-primary);
        }

        .btn-outline:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
        }

        /* Card System */
        .card-base {
            background: white;
            border-radius: var(--border-radius-lg);
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: var(--transition-base);
            animation: fadeIn 0.5s ease;
        }

        .card-base:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Layout Components */
        .skip-nav {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--primary-gradient);
            color: white;
            padding: 8px;
            text-decoration: none;
            border-radius: 0 0 8px 0;
            z-index: 100;
        }

        .skip-nav:focus { top: 0; }

        .header {
            background: var(--bg-primary);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo-section { display: flex; align-items: center; gap: 12px; }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: var(--primary-gradient);
            color: white;
            padding: 4px 12px;
            border-radius: var(--border-radius-lg);
            font-size: 12px;
            font-weight: 600;
        }

        .header-actions { display: flex; align-items: center; gap: 20px; }

        /* Interactive Elements */
        .interactive-base {
            cursor: pointer;
            transition: var(--transition-base);
        }

        .interactive-base:hover { transform: translateY(-2px); }

        .security-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #667eea;
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: var(--border-radius-lg);
        }

        .notification-bubble {
            position: relative;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            padding: 10px;
            border: none;
            color: #667eea;
        }

        .notification-bubble:hover,
        .notification-bubble:focus {
            transform: scale(1.1);
            background: rgba(102, 126, 234, 0.2);
            outline: 2px solid #667eea;
            outline-offset: 2px;
        }

        .notification-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(102, 126, 234, 0.1);
            padding: 8px 16px;
            border-radius: var(--border-radius-xl);
            color: var(--text-primary);
            border: none;
        }

        .user-menu:hover,
        .user-menu:focus {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
            outline: 2px solid #667eea;
            outline-offset: 2px;
        }

        /* Team Presence */
        .team-presence { display: flex; align-items: center; gap: 12px; }
        .active-viewers { display: flex; margin-left: -8px; }

        .viewer-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid white;
            margin-left: -8px;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            position: relative;
            cursor: pointer;
            color: white;
        }

        .viewer-avatar:hover::after {
            content: attr(title);
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a202c;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 10;
        }

        .start-huddle {
            padding: 6px 12px;
            background: rgba(102, 126, 234, 0.1);
            border: none;
            border-radius: var(--border-radius-lg);
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
        }

        /* Alerts & Notifications */
        .clinical-alert {
            background: #fee2e2;
            border-left: 4px solid var(--danger-color);
            border-radius: var(--border-radius-sm);
            padding: 16px;
            margin: 20px;
            display: flex;
            align-items: start;
            gap: 12px;
            animation: slideDown 0.5s ease, pulse 2s ease-in-out infinite;
        }

        .clinical-alert.critical {
            background: #fef2f2;
            border-left-color: #dc2626;
        }

        .clinical-alert h4 {
            font-size: 16px;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .clinical-alert p {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .clinical-alert button {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .clinical-alert button:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        /* Patient Information */
        .patient-banner {
            background: var(--bg-primary);
            margin: 20px;
            padding: 24px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s ease;
            flex-wrap: wrap;
            gap: 16px;
        }

        .patient-info { display: flex; align-items: center; gap: 16px; }

        .patient-avatar {
            width: 56px;
            height: 56px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .patient-details h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .patient-meta {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .action-buttons { display: flex; gap: 12px; flex-wrap: wrap; }

        /* Quick Actions */
        .quick-actions-bar {
            display: flex;
            gap: 8px;
            background: rgba(102, 126, 234, 0.05);
            padding: 12px;
            border-radius: var(--border-radius-md);
            margin: 0 20px 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            color: var(--text-primary);
        }

        .quick-action {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: var(--border-radius-sm);
            font-size: 14px;
            font-weight: normal;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition-base);
            white-space: nowrap;
        }

        .quick-action:hover,
        .quick-action:focus {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        /* Tab System */
        .tabs-container {
            background: var(--bg-primary);
            margin: 0 20px;
            border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
            padding: 0 24px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tabs {
            display: flex;
            gap: 32px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            min-width: fit-content;
        }

        .tab {
            padding: 20px 4px;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: var(--transition-base);
            white-space: nowrap;
        }

        .tab:hover, .tab:focus { color: #667eea; outline: none; }
        .tab.active { color: #667eea; }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px 3px 0 0;
            animation: slideIn 0.3s ease;
        }

        /* Main Content */
        .main-content {
            background: var(--bg-primary);
            margin: 0 20px 20px;
            padding: 24px;
            border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg);
            min-height: calc(100vh - 300px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Diagnosis Cards */
        .diagnosis-card {
            background: white;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: var(--transition-base);
            margin-bottom: 20px;
            animation: slideRight 0.5s ease;
            color: var(--text-primary);
            position: relative;
        }

        .diagnosis-card.high-probability { border-left: 4px solid #10b981; }
        .diagnosis-card.medium-probability { border-left: 4px solid #f59e0b; }
        .diagnosis-card.low-probability { border-left: 4px solid #ef4444; }
        .diagnosis-card.collapsed .diagnosis-body { display: none; }
        .diagnosis-card.collapsed { margin-bottom: 12px; }

        .diagnosis-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            cursor: pointer;
        }

        .diagnosis-header:hover { background: rgba(0, 0, 0, 0.02); }

        .diagnosis-title {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .diagnosis-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .probability-badge {
            padding: 4px 12px;
            border-radius: var(--border-radius-lg);
            font-size: 12px;
            font-weight: 600;
        }

        .probability-high {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: var(--text-primary);
        }

        .probability-medium {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: var(--text-primary);
        }

        .probability-low {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: var(--text-primary);
        }

        .diagnosis-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .collapse-toggle {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .collapse-toggle:hover {
            background: rgba(107, 114, 128, 0.1);
            color: #374151;
        }

        .collapse-toggle svg { transition: transform 0.3s ease; }
        .diagnosis-card.collapsed .collapse-toggle svg { transform: rotate(-90deg); }

        /* Findings Grid */
        .findings-section {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .findings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .finding-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-base);
            color: var(--text-primary);
        }

        .finding-item:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            transform: translateY(-2px);
        }

        .finding-text {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .status-buttons { display: flex; gap: 4px; }

        .status-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-base);
            font-size: 14px;
            color: var(--text-primary);
        }

        .status-btn:hover { transform: scale(1.1); }

        .status-btn:focus {
            outline: 2px solid #667eea;
            outline-offset: 2px;
        }

        .status-btn.active-present {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        .status-btn.active-absent {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
        }

        .status-btn.active-unknown {
            background: linear-gradient(135deg, #9ca3af, #6b7280);
            color: white;
            box-shadow: 0 2px 8px rgba(107, 114, 128, 0.3);
        }

        /* Recommendations */
        .recommendations-section {
            padding: 20px;
            padding-bottom: 60px;
        }

        .recommendation-item {
            display: flex;
            align-items: start;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .recommendation-icon {
            width: 24px;
            height: 24px;
            background: var(--primary-gradient);
            border-radius: var(--border-radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .diagnosis-bottom-actions {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* AI Confidence */
        .ai-confidence-meter {
            margin-top: 16px;
            background: #f8fafc;
            border-radius: var(--border-radius-sm);
            padding: 12px;
            color: var(--text-primary);
        }

        .confidence-bar {
            height: 8px;
            background: var(--primary-gradient);
            border-radius: 4px;
            transition: width 0.6s ease;
            margin-bottom: 8px;
        }

        .confidence-explanation {
            font-size: 12px;
            color: var(--text-primary);
        }

        .explain-ai-reasoning {
            margin-top: 8px;
            background: none;
            border: none;
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.3s ease;
        }

        .explain-ai-reasoning:hover { color: #764ba2; }

        /* Chief Complaint Selector */
        .complaint-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
        }

        .complaint-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: var(--border-radius-xl);
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .complaint-tab:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .complaint-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        .complaint-icon { font-size: 16px; }

        .add-complaint {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: transparent;
            border: 2px dashed #d1d5db;
            border-radius: var(--border-radius-xl);
            font-size: 14px;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .add-complaint:hover {
            border-color: #667eea;
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        /* Voice Input */
        .voice-input-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: var(--transition-base);
            z-index: 40;
        }

        .voice-input-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.5);
        }

        .voice-input-btn.recording {
            animation: pulse 1.5s ease-in-out infinite;
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        /* Guidelines Modal */
        .guidelines-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }

        .guidelines-content {
            background: white;
            width: 95%;
            max-width: 1200px;
            max-height: 90vh;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideIn {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }

        /* Smart Notes */
        .smart-notes {
            margin-top: 20px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: var(--border-radius-md);
            padding: 16px;
            color: var(--text-primary);
        }

        .clinical-notes {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius-sm);
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s ease;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.9);
        }

        .clinical-notes:focus {
            outline: none;
            border-color: #667eea;
        }

        .clinical-notes::placeholder { color: #6b7280; }

        .code-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: var(--border-radius-lg);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition-base);
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .code-chip:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        /* Evidence Panel */
        .evidence-panel {
            background: rgba(102, 126, 234, 0.05);
            border-radius: var(--border-radius-md);
            padding: 16px;
            margin-top: 16px;
            color: var(--text-primary);
        }

        .evidence-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: var(--border-radius-sm);
            text-decoration: none;
            color: var(--text-primary);
            font-size: 14px;
            transition: var(--transition-base);
            margin-bottom: 8px;
        }

        .evidence-link:hover {
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.9);
        }

        .evidence-grade {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .content-grid { grid-template-columns: 1fr; }
            .findings-grid { grid-template-columns: 1fr; }
            .patient-banner { flex-direction: column; align-items: start; }
        }

        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .security-badge { display: none; }
            .diagnosis-card { margin-bottom: 16px; }
            .diagnosis-header { padding: 16px; }
            .diagnosis-title { flex-direction: column; align-items: start; }
            .tabs { gap: 16px; }
            .tab { padding: 16px 4px; font-size: 14px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }

        /* Print Styles */
        @media print {
            body { background: white; color: black !important; }
            .header, .quick-actions-bar, .team-presence, .voice-input-btn, .btn, .status-buttons { display: none !important; }
            .card-base, .diagnosis-card { break-inside: avoid; box-shadow: none; border: 1px solid #e5e7eb; }
            .main-content { margin: 0; padding: 20px; }
            * { color: black !important; }
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --text-primary: #000000;
                --text-secondary: #1f2937;
                --bg-primary: rgba(255, 255, 255, 0.95);
            }
            body { background: linear-gradient(135deg, #1f2937 0%, #111827 100%); }
            .card-base, .diagnosis-card { background: white; color: var(--text-primary); }
            .clinical-notes { background: white; border-color: #4b5563; color: var(--text-primary); }
        }
    </style>
</head>

        <div id="tab-container"></div>

    <!-- Voice Input Button -->
    <button class="voice-input-btn" aria-label="Start voice input" data-action="voice-input">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
        </svg>
    </button>

    <!-- Guidelines Modal Container -->
    <div id="guidelines-modal" class="guidelines-modal"></div>

    <script>
        // Application State Management
        class AppState {
            constructor() {
                this.data = {
                    patient: {
                        name: 'Sarah Johnson',
                        age: 32,
                        gender: 'Female',
                        mrn: '78932145',
                        chiefComplaint: 'Severe headache for 3 days'
                    },
                    activeTab: 'summary',
                    diagnoses: [
                        {
                            id: 'migraine',
                            name: 'Migraine with Aura',
                            probability: 85,
                            level: 'high',
                            complaint: 'headache',
                            collapsed: false,
                            findings: {
                                'unilateral': 'present',
                                'visual-aura': 'present',
                                'photophobia': 'present',
                                'nausea': 'present',
                                'throbbing': 'present',
                                'family-history': 'unknown'
                            }
                        },
                        {
                            id: 'secondary',
                            name: 'Secondary Headache (Urgent Rule Out)',
                            probability: 30,
                            level: 'medium',
                            complaint: 'headache',
                            collapsed: true
                        },
                        {
                            id: 'tension',
                            name: 'Tension-Type Headache',
                            probability: 15,
                            level: 'low',
                            complaint: 'headache',
                            collapsed: true
                        }
                    ],
                    ui: {
                        modalsOpen: [],
                        activeComplaint: 'headache',
                        allCollapsed: false,
                        isRecording: false
                    }
                };
                this.listeners = [];
            }

            get(path) {
                return path.split('.').reduce((obj, key) => obj?.[key], this.data);
            }

            set(path, value) {
                const keys = path.split('.');
                const lastKey = keys.pop();
                const target = keys.reduce((obj, key) => obj[key] = obj[key] || {}, this.data);
                target[lastKey] = value;
                this.notify(path, value);
            }

            subscribe(callback) {
                this.listeners.push(callback);
            }

            notify(path, value) {
                this.listeners.forEach(callback => callback(path, value));
            }
        }

        // Component System
        class ComponentSystem {
            constructor(state) {
                this.state = state;
                this.components = new Map();
                this.templates = this.initializeTemplates();
            }

            initializeTemplates() {
                return {
                    summaryTab: () => `
                        <div class="tab-content active" data-tab-content="summary">
                            <div style="max-width: 800px; margin: 0 auto;">
                                ${this.renderClinicalSummary()}
                                ${this.renderPreVisitSummary()}
                                ${this.renderAIFlags()}
                            </div>
                        </div>
                    `,

                    differentialTab: () => `
                        <div class="tab-content" data-tab-content="differential">
                            <div class="content-grid">
                                <div>${this.renderAIFlags()}</div>
                                <div>
                                    ${this.renderComplaintSelector()}
                                    ${this.renderDiagnosisCards()}
                                </div>
                            </div>
                        </div>
                    `,

                    treatmentTab: () => `
                        <div class="tab-content" data-tab-content="treatment">
                            <div class="content-grid">
                                <div>
                                    ${this.renderEmergencyTreatment()}
                                </div>
                                <div>
                                    ${this.renderAcuteTreatment()}
                                    ${this.renderPatientFactors()}
                                </div>
                            </div>
                            ${this.renderFollowUpCare()}
                        </div>
                    `,

                    documentationTab: () => `
                        <div class="tab-content" data-tab-content="documentation">
                            <div class="card-base">
                                <div class="card-header">
                                    <h3 class="card-title">Clinical Documentation</h3>
                                </div>
                                <p>Documentation content would go here...</p>
                            </div>
                        </div>
                    `,

                    historyTab: () => `
                        <div class="tab-content" data-tab-content="history">
                            <div class="card-base">
                                <div class="card-header">
                                    <h3 class="card-title">Patient History</h3>
                                </div>
                                <p>Patient history content would go here...</p>
                            </div>
                        </div>
                    `
                };
            }

            renderClinicalSummary() {
                return `
                    <div class="card-base" style="background: #1f2937; color: white;">
                        <div class="card-header">
                            <h3 class="card-title" style="color: white;">AI-Generated Clinical Summary</h3>
                            <a href="#" class="btn-base" style="color: #a5b4fc; font-size: 13px; padding: 4px 8px;">Edit</a>
                        </div>
                        <div style="padding: 20px;">
                            <div style="margin-bottom: 20px;">
                                <div style="font-size: 13px; font-weight: 600; color: white; margin-bottom: 6px;">Vital Signs</div>
                                <div style="font-size: 14px; color: white;">BP: 138/88 ↑, HR: 96 ↑, Temp: 98.6°F, RR: 18, SpO2: 99%</div>
                            </div>
                            <div style="margin-bottom: 20px;">
                                <div style="font-size: 13px; font-weight: 600; color: white; margin-bottom: 6px;">History of Present Illness</div>
                                <div style="font-size: 14px; color: white; line-height: 1.6;">32-year-old female presenting with a 3-day history of severe right-sided headache. Pain is described as throbbing and rated 9/10 at its worst. Associated with photophobia, phonophobia, and nausea with vomiting. Patient reports visual aura (zigzag lines) prior to headache onset.</div>
                            </div>
                            <div>
                                <div style="font-size: 13px; font-weight: 600; color: white; margin-bottom: 6px;">Key Chat Insights</div>
                                <div style="background: white; border-radius: 8px; padding: 12px; margin-top: 12px;">
                                    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                        <span style="font-size: 11px; min-width: 45px; color: #9ca3af;">10:32</span>
                                        <span style="font-size: 13px; color: #000000;">"I see zigzag lines before the headache starts"</span>
                                    </div>
                                    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                        <span style="font-size: 11px; min-width: 45px; color: #9ca3af;">10:35</span>
                                        <span style="font-size: 13px; color: #000000;">"My mom has migraines too"</span>
                                    </div>
                                    <div style="display: flex; gap: 8px;">
                                        <span style="font-size: 11px; min-width: 45px; color: #f59e0b;">⚠️ 10:40</span>
                                        <span style="font-size: 13px; color: #000000; background: #fef3c7; padding: 4px 8px; border-radius: 4px;">"I also feel confused sometimes"</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderPreVisitSummary() {
                return `
                    <div class="card-base">
                        <div class="card-header">
                            <h3 class="card-title">Pre-Visit Summary</h3>
                            <a href="#" class="btn-base" style="color: #667eea; font-size: 13px; padding: 4px 8px;">Edit</a>
                        </div>
                        <div class="smart-notes" style="background: rgba(102, 126, 234, 0.05); color: var(--text-primary);">
                            <h4 style="color: var(--text-primary); margin-bottom: 12px;">Clinical Notes</h4>
                            <textarea class="clinical-notes" placeholder="Start typing clinical notes..."></textarea>
                            <div style="margin-top: 12px;">
                                <h5 style="color: var(--text-primary); font-size: 13px; margin-bottom: 8px;">Suggested ICD-10 Codes:</h5>
                                <button class="code-chip">G43.109 - Migraine with aura, not intractable</button>
                                <button class="code-chip">R51.9 - Headache, unspecified</button>
                                <button class="code-chip">G44.1 - Vascular headache, not elsewhere classified</button>
                            </div>
                        </div>
                        <div class="evidence-panel" style="background: rgba(102, 126, 234, 0.05); color: var(--text-primary);">
                            <h4 style="color: var(--text-primary);">Latest Evidence & Guidelines</h4>
                            <a href="#" class="evidence-link" style="color: var(--text-primary); background: rgba(255, 255, 255, 0.7);">
                                2024 AAN Practice Guideline: Acute Migraine Treatment
                                <span class="evidence-grade">Level A</span>
                            </a>
                            <a href="#" class="evidence-link" style="color: var(--text-primary); background: rgba(255, 255, 255, 0.7);">
                                Red Flag Headaches: When to Image
                                <span class="evidence-grade">Level B</span>
                            </a>
                        </div>
                    </div>
                `;
            }

            renderAIFlags() {
                return `
                    <div class="card-base">
                        <div style="background: #fef3c7; border: 1px solid #fcd34d; border-radius: 8px; padding: 16px; display: flex; gap: 12px;">
                            <svg class="icon" fill="none" stroke="#f59e0b" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                            </svg>
                            <div style="flex: 1;">
                                <div style="font-size: 14px; font-weight: 600; color: #000000; margin-bottom: 4px;">AI Flags for Review</div>
                                <ul style="font-size: 13px; color: #000000; list-style: none;">
                                    <li style="margin-bottom: 4px;">• "Worst headache of life" - requires urgent evaluation</li>
                                    <li style="margin-bottom: 4px;">• Confusion mentioned - consider neurological exam</li>
                                    <li style="margin-bottom: 4px;">• BP elevated - check for hypertensive emergency</li>
                                    <li style="margin-bottom: 4px;">• Check pregnancy status before prescribing triptans</li>
                                    <li>• Family history incomplete - neurological conditions</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderComplaintSelector() {
                const activeComplaint = this.state.get('ui.activeComplaint');
                return `
                    <div class="card-base" style="margin-bottom: 16px;">
                        <div class="card-header" style="padding: 4px 16px; margin-bottom: 0; min-height: auto;">
                            <h3 class="card-title" style="font-size: 12px; margin: 0;">Chief Complaint</h3>
                        </div>
                        <div style="padding: 4px 16px;">
                            <div class="complaint-tabs">
                                <button class="complaint-tab ${activeComplaint === 'headache' ? 'active' : ''}" data-complaint="headache">
                                    <span class="complaint-icon">🧠</span>
                                    Severe Headache
                                </button>
                                <button class="complaint-tab ${activeComplaint === 'nausea' ? 'active' : ''}" data-complaint="nausea">
                                    <span class="complaint-icon">🤢</span>
                                    Nausea/Vomiting
                                </button>
                                <button class="complaint-tab ${activeComplaint === 'confusion' ? 'active' : ''}" data-complaint="confusion">
                                    <span class="complaint-icon">😵</span>
                                    Confusion
                                </button>
                                <button class="add-complaint" data-action="add-complaint">
                                    <svg class="icon-sm" viewBox="0 0 24 24">
                                        <line x1="12" y1="5" x2="12" y2="19"></line>
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                    </svg>
                                    Add Complaint
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderDiagnosisCards() {
                const activeComplaint = this.state.get('ui.activeComplaint');
                const diagnoses = this.state.get('diagnoses').filter(d => d.complaint === activeComplaint);
                
                return diagnoses.map(diagnosis => this.renderDiagnosisCard(diagnosis)).join('');
            }

            renderDiagnosisCard(diagnosis) {
                const collapsedClass = diagnosis.collapsed ? 'collapsed' : '';
                const levelClass = `${diagnosis.level}-probability`;
                
                return `
                    <div class="diagnosis-card ${levelClass} ${collapsedClass}" data-diagnosis="${diagnosis.id}" data-complaint="${diagnosis.complaint}">
                        <div class="diagnosis-header" data-action="toggle-diagnosis" data-diagnosis-id="${diagnosis.id}">
                            <div class="diagnosis-title">
                                <h3 class="diagnosis-name">${diagnosis.name}</h3>
                                <span class="probability-badge probability-${diagnosis.level}">${diagnosis.probability}% probability</span>
                            </div>
                            <div class="diagnosis-actions">
                                <button class="collapse-toggle">
                                    <svg class="icon-sm" viewBox="0 0 24 24">
                                        <polyline points="${diagnosis.collapsed ? '9 18 15 12 9 6' : '6 9 12 15 18 9'}"></polyline>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="diagnosis-body">
                            ${this.renderDiagnosisContent(diagnosis)}
                        </div>
                    </div>
                `;
            }

            renderDiagnosisContent(diagnosis) {
                if (diagnosis.id === 'migraine') {
                    return `
                        <div class="findings-section">
                            <h4 class="card-title">Key Findings</h4>
                            <div class="findings-grid">
                                ${this.renderFindingItem('Unilateral headache', 'present')}
                                ${this.renderFindingItem('Visual aura', 'present')}
                                ${this.renderFindingItem('Photophobia', 'present')}
                                ${this.renderFindingItem('Nausea/Vomiting', 'present')}
                                ${this.renderFindingItem('Throbbing quality', 'present')}
                                ${this.renderFindingItem('Family history', 'unknown')}
                            </div>

            render(templateName, container) {

            renderActiveTab() {
                const activeTab = this.state.get('activeTab');
                const container = document.getElementById('tab-container');
                
                // Clear existing content
                container.innerHTML = '';
                
                // Render all tabs
                const allTabs = ['summary', 'differential', 'treatment', 'documentation', 'history'];
                allTabs.forEach(tab => {
                    const tabContent = this.templates[`${tab}Tab`]();
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = tabContent;
                    const tabElement = tempDiv.firstElementChild;
                    
                    if (tab === activeTab) {
                        tabElement.classList.add('active');
                    } else {
                        tabElement.classList.remove('active');
                    }
                    
                    container.appendChild(tabElement);
                });

        // Event Handler System
        class EventHandler {
            constructor(state, componentSystem) {
                this.state = state;
                this.componentSystem = componentSystem;
                this.setupEventDelegation();
                this.setupKeyboardNavigation();
            }

            setupEventDelegation() {
                document.addEventListener('click', (e) => {
                    const action = e.target.closest('[data-action]')?.dataset.action;
                    if (action && this.handlers[action]) {
                        e.preventDefault();
                        this.handlers[action](e);
                    }
                });

                document.addEventListener('change', (e) => {
                    if (e.target.matches('.clinical-notes')) {
                        this.handleNotesChange(e);
                    }
                });
            }

            setupKeyboardNavigation() {
                document.addEventListener('keydown', (e) => {
                    // Tab navigation
                    if (e.target.matches('.tab')) {
                        this.handleTabKeyNavigation(e);
                    }
                    
                    // Modal escape
                    if (e.key === 'Escape') {
                        this.closeAllModals();
                    }
                    
                    // Quick actions
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                        e.preventDefault();
                        document.querySelector('.quick-action')?.focus();
                    }
                });
            }

            handleTabKeyNavigation(e) {
                const tabs = Array.from(document.querySelectorAll('.tab'));
                const currentIndex = tabs.indexOf(e.target);
                let nextIndex;

                switch (e.key) {
                    case 'ArrowRight':
                        nextIndex = (currentIndex + 1) % tabs.length;
                        break;
                    case 'ArrowLeft':
                        nextIndex = (currentIndex - 1 + tabs.length) % tabs.length;
                        break;
                    case 'Home':
                        nextIndex = 0;
                        break;
                    case 'End':
                        nextIndex = tabs.length - 1;
                        break;
                    default:
                        return;
                }

                e.preventDefault();
                tabs[nextIndex].focus();
                this.handlers['tab-switch']({ target: tabs[nextIndex] });
            }

            handlers = {
                'tab-switch': (e) => {
                    const tab = e.target.dataset.tab;
                    if (tab) {
                        this.switchTab(tab);
                    }
                },

                'toggle-diagnosis': (e) => {
                    const diagnosisId = e.target.closest('[data-diagnosis-id]')?.dataset.diagnosisId;
                    if (diagnosisId) {
                        this.toggleDiagnosis(diagnosisId);
                    }
                },

                'complaint-switch': (e) => {
                    const complaint = e.target.dataset.complaint;
                    if (complaint) {
                        this.switchComplaint(complaint);
                    }
                },

                'collapse-all': () => {
                    this.toggleAllDiagnoses();
                },

                'voice-input': () => {
                    this.toggleVoiceRecording();
                },

                'open-guidelines': () => {
                    this.openGuidelinesModal();
                },

                'set-finding-status': (e) => {
                    this.setFindingStatus(e);
                },

                'notifications': () => {
                    this.showNotification('Notifications opened');
                },

                'user-menu': () => {
                    this.showNotification('User menu opened');
                },

                'emergency-protocol': () => {
                    this.showNotification('🚨 Emergency protocol initiated');
                },

                'start-encounter': () => {
                    this.showNotification('✅ Encounter started');
                },

                'order-labs': () => {
                    this.showNotification('🧪 Lab orders initiated');
                },

                'prescribe': () => {
                    this.showNotification('💊 E-prescribe opened');
                },

                'explain-reasoning': () => {
                    this.showNotification('AI reasoning explanation displayed');
                },

                'initiate-emergency': () => {
                    this.showNotification('🚨 Emergency protocol initiated - CT head ordered');
                },

                'prescribe-medications': () => {
                    this.showNotification('💊 Prescription orders sent to pharmacy');
                },

                'add-complaint': () => {
                    this.addNewComplaint();
                }
            };

            switchTab(tabName) {
                // Update tab appearance
                document.querySelectorAll('.tab').forEach(tab => {
                    const isActive = tab.dataset.tab === tabName;
                    tab.classList.toggle('active', isActive);
                    tab.setAttribute('aria-selected', isActive);
                });

                // Update state and re-render
                this.state.set('activeTab', tabName);
                this.componentSystem.renderActiveTab();
            }

            toggleDiagnosis(diagnosisId) {
                const diagnoses = this.state.get('diagnoses');
                const diagnosis = diagnoses.find(d => d.id === diagnosisId);
                if (diagnosis) {
                    diagnosis.collapsed = !diagnosis.collapsed;
                    this.state.set('diagnoses', diagnoses);
                    this.componentSystem.renderActiveTab();
                }
            }

            switchComplaint(complaint) {
                this.state.set('ui.activeComplaint', complaint);
                this.componentSystem.renderActiveTab();
                this.showNotification(`Switched to: ${complaint}`);
            }

            toggleAllDiagnoses() {
                const allCollapsed = this.state.get('ui.allCollapsed');
                const diagnoses = this.state.get('diagnoses');
                
                diagnoses.forEach(diagnosis => {
                    diagnosis.collapsed = !allCollapsed;
                });
                
                this.state.set('diagnoses', diagnoses);
                this.state.set('ui.allCollapsed', !allCollapsed);
                this.componentSystem.renderActiveTab();
                
                this.showNotification(allCollapsed ? 'All diagnoses expanded' : 'All diagnoses collapsed');
            }

            toggleVoiceRecording() {
                const isRecording = this.state.get('ui.isRecording');
                const voiceBtn = document.querySelector('.voice-input-btn');
                
                if (!isRecording) {
                    voiceBtn.classList.add('recording');
                    this.state.set('ui.isRecording', true);
                    this.showNotification('Voice recording started');
                    
                    setTimeout(() => {
                        voiceBtn.classList.remove('recording');
                        this.state.set('ui.isRecording', false);
                        this.showNotification('Voice note saved to encounter');
                    }, 3000);
                } else {
                    voiceBtn.classList.remove('recording');
                    this.state.set('ui.isRecording', false);
                    this.showNotification('Voice recording stopped');
                }
            }

            setFindingStatus(e) {
                const status = e.target.dataset.status;
                const findingItem = e.target.closest('.finding-item');
                
                if (findingItem && status) {
                    const buttons = findingItem.querySelectorAll('.status-btn');
                    buttons.forEach(btn => {
                        btn.classList.remove('active-present', 'active-absent', 'active-unknown');
                        btn.setAttribute('aria-checked', 'false');
                    });
                    
                    e.target.classList.add(`active-${status}`);
                    e.target.setAttribute('aria-checked', 'true');
                }
            }

            openGuidelinesModal() {
                // Placeholder for guidelines modal
                this.showNotification('Guidelines modal would open here');
            }

            addNewComplaint() {
                const complaintName = prompt('Enter new chief complaint:');
                if (complaintName && complaintName.trim()) {
                    this.showNotification(`Added new complaint: ${complaintName}`);
                }
            }

            handleNotesChange(e) {
                clearTimeout(this.autoSaveTimer);
                this.autoSaveTimer = setTimeout(() => {
                    this.showNotification('Notes auto-saved');
                }, 2000);
            }

            closeAllModals() {
                const modals = document.querySelectorAll('.guidelines-modal');
                modals.forEach(modal => {
                    modal.style.display = 'none';
                });
                document.body.style.overflow = '';
            }

            showNotification(message) {
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    bottom: 80px;
                    right: 20px;
                    background: #1a202c;
                    color: white;
                    padding: 12px 24px;
                    border-radius: 8px;
                    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
                    z-index: 100;
                    animation: slideUp 0.3s ease;
                `;
                notification.textContent = message;
                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.style.animation = 'slideDown 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
        }

        // Application Initialization
        class AttendingApp {
            constructor() {
                this.state = new AppState();
                this.componentSystem = new ComponentSystem(this.state);
                this.eventHandler = new EventHandler(this.state, this.componentSystem);
                
                this.init();
            }

            init() {
                // Set up event delegation for tabs
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        this.eventHandler.handlers['tab-switch'](e);
                    });
                });

                // Set up event delegation for complaint tabs
                document.addEventListener('click', (e) => {
                    if (e.target.matches('.complaint-tab')) {
                        const complaint = e.target.dataset.complaint;
                        this.eventHandler.switchComplaint(complaint);
                    }
                });

                // Initial render
                this.componentSystem.renderActiveTab();
                
                // Simulate real-time collaboration
                setTimeout(() => this.simulateCollaboration(), 5000);
                
                // Initialize session management
                this.initSessionManagement();
            }

            simulateCollaboration() {
                const viewers = document.querySelector('.active-viewers');
                const newViewer = document.createElement('div');
                newViewer.className = 'viewer-avatar';
                newViewer.style.cssText = 'background: #f59e0b; color: white;';
                newViewer.textContent = 'PT';
                newViewer.title = 'Pharmacist Taylor joined';
                viewers.appendChild(newViewer);
                
                this.eventHandler.showNotification('Pharmacist Taylor joined the session');
                
                setTimeout(() => {
                    newViewer.remove();
                    this.eventHandler.showNotification('Pharmacist Taylor left the session');
                }, 10000);
            }

            initSessionManagement() {
                let sessionTimer;
                let warningShown = false;

                const resetSessionTimer = () => {
                    clearTimeout(sessionTimer);
                    warningShown = false;
                    
                    sessionTimer = setTimeout(() => {
                        if (!warningShown) {
                            warningShown = true;
                            if (confirm('Your session will expire in 2 minutes. Do you want to continue?')) {
                                resetSessionTimer();
                            }
                        }
                    }, 13 * 60 * 1000);
                };

                document.addEventListener('click', resetSessionTimer);
                document.addEventListener('keypress', resetSessionTimer);
                resetSessionTimer();
            }
        }

        // Initialize Application
        document.addEventListener('DOMContentLoaded', () => {
            new AttendingApp();
        });
    </script>
