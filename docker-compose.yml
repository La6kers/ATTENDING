# ============================================================
# ATTENDING AI - Docker Compose
# docker-compose.yml
#
# Local development and testing environment
# ============================================================

version: '3.8'

services:
  # ==========================================================================
  # DATABASE
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: attending-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: attending
      POSTGRES_PASSWORD: attending_dev_password
      POSTGRES_DB: attending_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attending -d attending_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # REDIS (Session Store & Cache)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: attending-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # PROVIDER PORTAL
  # ==========================================================================
  provider-portal:
    build:
      context: .
      dockerfile: apps/provider-portal/Dockerfile
    container_name: attending-provider-portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://attending:attending_dev_password@postgres:5432/attending_db
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-min-32-characters-long}
      - NEXT_PUBLIC_WS_URL=http://localhost:3003
      - DEV_BYPASS_AUTH=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # PATIENT PORTAL (COMPASS)
  # ==========================================================================
  patient-portal:
    build:
      context: .
      dockerfile: apps/patient-portal/Dockerfile
    container_name: attending-patient-portal
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://attending:attending_dev_password@postgres:5432/attending_db
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-min-32-characters-long}
      - NEXT_PUBLIC_WS_URL=http://localhost:3003
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # WEBSOCKET SERVICE
  # ==========================================================================
  websocket:
    build:
      context: .
      dockerfile: services/websocket/Dockerfile
    container_name: attending-websocket
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - WS_PORT=3003
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000,http://localhost:3001
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # NGINX REVERSE PROXY (Optional - for production-like setup)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: attending-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - provider-portal
      - patient-portal
      - websocket
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: attending-network
    driver: bridge
