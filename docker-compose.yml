# ============================================================
# ATTENDING AI - Docker Compose
# docker-compose.yml
#
# Local development and testing environment
# Uses MS SQL Server 2022 (aligned with Azure SQL production)
# ============================================================

services:
  # ==========================================================================
  # DATABASE - MS SQL Server 2022
  # ==========================================================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: attending-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Attending_Dev_2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Attending_Dev_2026!" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==========================================================================
  # DATABASE INITIALIZATION
  # Creates the attending_db database on first run
  # ==========================================================================
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: attending-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: ["/opt/mssql-tools18/bin/sqlcmd", "-S", "sqlserver", "-U", "sa", "-P", "Attending_Dev_2026!", "-C", "-Q", "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'attending_db') CREATE DATABASE attending_db;"]
    restart: "no"

  # ==========================================================================
  # REDIS (Session Store & Cache)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: attending-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # PROVIDER PORTAL
  # ==========================================================================
  provider-portal:
    build:
      context: .
      dockerfile: apps/provider-portal/Dockerfile
    container_name: attending-provider-portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=sqlserver://sqlserver:1433;database=attending_db;user=sa;password=Attending_Dev_2026!;trustServerCertificate=true;encrypt=true
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-min-32-characters-long}
      - NEXT_PUBLIC_WS_URL=http://localhost:3003
      - DEV_BYPASS_AUTH=false
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # PATIENT PORTAL (COMPASS)
  # ==========================================================================
  patient-portal:
    build:
      context: .
      dockerfile: apps/patient-portal/Dockerfile
    container_name: attending-patient-portal
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=sqlserver://sqlserver:1433;database=attending_db;user=sa;password=Attending_Dev_2026!;trustServerCertificate=true;encrypt=true
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-min-32-characters-long}
      - NEXT_PUBLIC_WS_URL=http://localhost:3003
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # NGINX REVERSE PROXY (Optional - for production-like setup)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: attending-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - provider-portal
      - patient-portal
    profiles:
      - production

volumes:
  sqlserver_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: attending-network
    driver: bridge
