# =============================================================
# ATTENDING AI - Development Stack
# Usage: docker compose up -d
# =============================================================
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: attending-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Attending_Dev_2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Attending_Dev_2026!" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: attending-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attending-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__AttendingDb: "Server=sqlserver,1433;Database=attending_db;User Id=sa;Password=Attending_Dev_2026!;TrustServerCertificate=True;MultipleActiveResultSets=true"
      ConnectionStrings__Redis: "redis:6379"
      Authentication__DevBypass: "true"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy

  seq:
    image: datalust/seq:latest
    container_name: attending-seq
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq-data:/data

volumes:
  sqlserver-data:
  redis-data:
  seq-data:
