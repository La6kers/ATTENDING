# ============================================================
# ATTENDING AI - Ingress Configuration
# infrastructure/k8s/ingress.yaml
# ============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: attending-ai-ingress
  namespace: attending-ai
  annotations:
    # Azure Application Gateway annotations
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
    appgw.ingress.kubernetes.io/cookie-based-affinity: "true"
    appgw.ingress.kubernetes.io/request-timeout: "60"
    # WAF is handled by Azure Front Door (configured in Terraform), not Application Gateway

    # CORS configuration
    appgw.ingress.kubernetes.io/override-frontend-port: "443"

    # Rate limiting is handled by Azure WAF policy (configured in Terraform)
    # Security headers are handled at the application level (Next.js config) and WAF level (Terraform)
spec:
  tls:
  - hosts:
    - provider.attending.ai
    - compass.attending.ai
    - ws.attending.ai
    - api.attending.ai
    secretName: attending-ai-tls
  
  rules:
  # Provider Portal
  - host: provider.attending.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: provider-portal
            port:
              number: 80
  
  # Patient Portal (COMPASS)
  - host: compass.attending.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: patient-portal
            port:
              number: 80
  
  # WebSocket Service
  - host: ws.attending.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: websocket-service
            port:
              number: 80
  
  # API Gateway (routes to provider portal API)
  - host: api.attending.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: provider-portal
            port:
              number: 80

---
# Certificate managed by cert-manager
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: attending-ai-tls
  namespace: attending-ai
spec:
  secretName: attending-ai-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - provider.attending.ai
  - compass.attending.ai
  - ws.attending.ai
  - api.attending.ai

---
# Cluster Issuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: security@attending.ai
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: azure/application-gateway

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: attending-ai-sa
  namespace: attending-ai
  annotations:
    azure.workload.identity/client-id: "${AZURE_CLIENT_ID}"

---
# Network Policy - Allow ingress from Application Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress
  namespace: attending-ai
spec:
  podSelector:
    matchLabels:
      tier: web
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    - ipBlock:
        cidr: 10.0.0.0/8  # Azure VNet CIDR
    ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 3001
    - protocol: TCP
      port: 3003
  egress:
  # DNS resolution (kube-dns)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Intra-namespace traffic (pod-to-pod communication)
  - to:
    - podSelector: {}
  # Azure SQL Server
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 1433
  # Redis (TLS)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 6380
