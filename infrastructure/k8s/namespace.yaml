# ============================================================
# ATTENDING AI - Kubernetes Namespace Configuration
# infrastructure/k8s/namespace.yaml
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: attending-ai
  labels:
    app.kubernetes.io/name: attending-ai
    app.kubernetes.io/part-of: attending-platform
    environment: production

---
# Resource Quotas for the namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: attending-ai-quota
  namespace: attending-ai
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    persistentvolumeclaims: "10"
    services: "20"
    secrets: "50"
    configmaps: "50"

---
# Limit Ranges for pods
apiVersion: v1
kind: LimitRange
metadata:
  name: attending-ai-limits
  namespace: attending-ai
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    type: Container

---
# Network Policy - Default deny all ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: attending-ai
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# Network Policy - Allow internal communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: attending-ai
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/part-of: attending-platform
