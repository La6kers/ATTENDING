# ============================================================
# ATTENDING AI - Patient Portal (COMPASS) Kubernetes Deployment
# infrastructure/k8s/patient-portal.yaml
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: patient-portal-config
  namespace: attending-ai
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-portal
  namespace: attending-ai
  labels:
    app: patient-portal
    component: frontend
    tier: web
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: patient-portal
  template:
    metadata:
      labels:
        app: patient-portal
        component: frontend
        tier: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: attending-ai-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      containers:
      - name: patient-portal
        image: ghcr.io/la6kers/attending/patient-portal:latest
        imagePullPolicy: Always
        
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        
        envFrom:
        - configMapRef:
            name: patient-portal-config
        - secretRef:
            name: provider-portal-secrets
        
        env:
        - name: NEXTAUTH_URL
          value: "https://compass.attending.ai"
        - name: WEBSOCKET_URL
          value: "wss://ws.attending.ai"
        - name: PROVIDER_PORTAL_URL
          value: "https://provider.attending.ai"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: nextjs-cache
          mountPath: /app/.next/cache
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: nextjs-cache
        emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: patient-portal
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: patient-portal
  namespace: attending-ai
  labels:
    app: patient-portal
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: patient-portal

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: patient-portal-hpa
  namespace: attending-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: patient-portal
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 200
        periodSeconds: 15

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: patient-portal-pdb
  namespace: attending-ai
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: patient-portal
