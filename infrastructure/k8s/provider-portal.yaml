# ============================================================
# ATTENDING AI - Provider Portal Kubernetes Deployment
# infrastructure/k8s/provider-portal.yaml
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-portal-config
  namespace: attending-ai
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  LOG_LEVEL: "info"

---
apiVersion: v1
kind: Secret
metadata:
  name: provider-portal-secrets
  namespace: attending-ai
type: Opaque
stringData:
  # These should be managed via Azure Key Vault in production
  NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
  DATABASE_URL: "${DATABASE_URL}"
  REDIS_URL: "${REDIS_URL}"
  AZURE_AD_CLIENT_ID: "${AZURE_AD_CLIENT_ID}"
  AZURE_AD_CLIENT_SECRET: "${AZURE_AD_CLIENT_SECRET}"
  AI_MODEL_API_KEY: "${AI_MODEL_API_KEY}"
  FHIR_CLIENT_SECRET: "${FHIR_CLIENT_SECRET}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-portal
  namespace: attending-ai
  labels:
    app: provider-portal
    component: frontend
    tier: web
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: provider-portal
  template:
    metadata:
      labels:
        app: provider-portal
        component: frontend
        tier: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: attending-ai-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      containers:
      - name: provider-portal
        image: ghcr.io/la6kers/attending/provider-portal:v0.0.0-replace-in-ci  # Set by CI/CD pipeline — never use :latest
        imagePullPolicy: Always
        
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        
        envFrom:
        - configMapRef:
            name: provider-portal-config
        - secretRef:
            name: provider-portal-secrets
        
        env:
        - name: NEXTAUTH_URL
          value: "https://provider.attending.ai"
        - name: WEBSOCKET_URL
          value: "wss://ws.attending.ai"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: nextjs-cache
          mountPath: /app/.next/cache
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: nextjs-cache
        emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: provider-portal
              topologyKey: kubernetes.io/hostname
      
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: provider-portal

---
apiVersion: v1
kind: Service
metadata:
  name: provider-portal
  namespace: attending-ai
  labels:
    app: provider-portal
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: provider-portal

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: provider-portal-hpa
  namespace: attending-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: provider-portal
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: provider-portal-pdb
  namespace: attending-ai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: provider-portal
