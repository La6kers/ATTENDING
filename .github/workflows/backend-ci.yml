# =============================================================
# ATTENDING AI - Backend CI/CD
# Runs on every push/PR to main that touches backend/
# =============================================================
name: Backend CI

on:
  push:
    branches: [main, develop, 'feature/**']
    paths: ['backend/**']
  pull_request:
    branches: [main, develop]
    paths: ['backend/**']

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /warnaserror

      - name: Unit + Integration Tests (InMemory DB)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category!=Docker" --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Tests
          path: backend/**/test-results.trx
          reporter: dotnet-trx

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: backend
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t attending-api:${{ github.sha }} .

      - name: Test Docker health
        run: |
          docker run -d --name test-api \
            -e ASPNETCORE_ENVIRONMENT=Testing \
            -e "ConnectionStrings__AttendingDb=Server=localhost;Database=test;TrustServerCertificate=True" \
            -p 8080:8080 \
            attending-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080/health/ready || exit 1
          docker stop test-api
