name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME_PROVIDER: attending-provider-staging
  AZURE_WEBAPP_NAME_PATIENT: attending-patient-staging

jobs:
  build-and-deploy:
    name: Build and Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      # Build Provider Portal
      - name: Install Provider Portal dependencies
        working-directory: apps/provider-portal
        run: npm ci
        
      - name: Build Provider Portal
        working-directory: apps/provider-portal
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          
      # Build Patient Portal
      - name: Install Patient Portal dependencies
        working-directory: apps/patient-portal
        run: npm ci
        
      - name: Build Patient Portal
        working-directory: apps/patient-portal
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          
      # Deploy to Azure (placeholder - configure when Azure is set up)
      # - name: Deploy Provider Portal to Azure
      #   uses: azure/webapps-deploy@v2
      #   with:
      #     app-name: ${{ env.AZURE_WEBAPP_NAME_PROVIDER }}
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROVIDER }}
      #     package: apps/provider-portal/.next
          
      # - name: Deploy Patient Portal to Azure
      #   uses: azure/webapps-deploy@v2
      #   with:
      #     app-name: ${{ env.AZURE_WEBAPP_NAME_PATIENT }}
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PATIENT }}
      #     package: apps/patient-portal/.next

      - name: Deployment Summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Provider Portal: Built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Patient Portal: Built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Azure deployment: Pending configuration" >> $GITHUB_STEP_SUMMARY
