name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

env:
  AZURE_WEBAPP_NAME_PROVIDER: attending-provider-prod
  AZURE_WEBAPP_NAME_PATIENT: attending-patient-prod

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - name: Check deployment confirmation
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.confirm }}" == "deploy" ]]; then
              echo "deploy=true" >> $GITHUB_OUTPUT
            else
              echo "::error::Deployment not confirmed. Please type 'deploy' to confirm."
              exit 1
            fi
          else
            echo "deploy=true" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_deploy == 'true'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      # Build Provider Portal
      - name: Install Provider Portal dependencies
        working-directory: apps/provider-portal
        run: npm ci
        
      - name: Build Provider Portal
        working-directory: apps/provider-portal
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          
      # Build Patient Portal
      - name: Install Patient Portal dependencies
        working-directory: apps/patient-portal
        run: npm ci
        
      - name: Build Patient Portal
        working-directory: apps/patient-portal
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          
      # Deploy to Azure (placeholder - configure when Azure is set up)
      # - name: Deploy Provider Portal to Azure
      #   uses: azure/webapps-deploy@v2
      #   with:
      #     app-name: ${{ env.AZURE_WEBAPP_NAME_PROVIDER }}
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROVIDER_PROD }}
      #     package: apps/provider-portal/.next
          
      # - name: Deploy Patient Portal to Azure
      #   uses: azure/webapps-deploy@v2
      #   with:
      #     app-name: ${{ env.AZURE_WEBAPP_NAME_PATIENT }}
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PATIENT_PROD }}
      #     package: apps/patient-portal/.next

      - name: Create Release Notes
        run: |
          echo "## Production Deployment v${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Components" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Provider Portal" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Patient Portal" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Time" >> $GITHUB_STEP_SUMMARY
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()
    steps:
      - name: Notify on Success
        if: needs.build-and-deploy.result == 'success'
        run: echo "Production deployment successful!"
        
      - name: Notify on Failure
        if: needs.build-and-deploy.result == 'failure'
        run: |
          echo "::error::Production deployment failed!"
          exit 1
