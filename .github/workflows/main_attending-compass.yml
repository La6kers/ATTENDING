# Deploy COMPASS Standalone to Azure Web App (Container)
# Builds Docker image, pushes to ACR, deploys to App Service
#
# Branch flow: dev (work) → mockup-2 (staging, no auto-deploy) → main (PROD, auto-deploys here)
# Before this change, the deploy was triggered from mockup-2. That made mockup-2
# effectively production even though the name implied staging. We've now moved
# the deploy trigger to main so the branch names match the actual roles:
#   dev       → active development, direct commits
#   mockup-2  → integration/staging, no auto-deploy
#   main      → production, every push to compass-standalone/shared auto-deploys
# The staging env is currently the same Azure App Service until a second env is
# provisioned — merging to main ships straight to attending-compass.azurewebsites.net.

name: Build and deploy COMPASS Standalone to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/compass-standalone/**'
      - 'apps/shared/**'
      - '.github/workflows/main_attending-compass.yml'
  workflow_dispatch:

env:
  ACR_NAME: compassacr2026
  ACR_LOGIN_SERVER: compassacr2026.azurecr.io
  IMAGE_NAME: compass-standalone
  APP_NAME: attending-compass
  RESOURCE_GROUP: compass-standalone-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CEDB13C2662A4FF98341AE951F77BF78 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DBCC7AEA5F274322940C4DC6E34C0065 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7D6F23FEE8394D3AA6B27C04B79E7FEB }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build \
            -f apps/compass-standalone/Dockerfile \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            --progress=plain \
            .

          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
