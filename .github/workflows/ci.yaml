name: CI

on:
  push:
    branches: [main, develop, mockup-2]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================================================
  # LINT AND TYPE CHECK
  # ==========================================================================
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install root dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Type check packages
        run: npm run type-check || true
        
      - name: Lint
        run: npm run lint || true

  # ==========================================================================
  # UNIT TESTS
  # ==========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Run unit tests
        run: npm run test -- --coverage --reporter=verbose
        
      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            coverage/
            test-results/
          retention-days: 7

  # ==========================================================================
  # CLINICAL SERVICES TESTS (Critical Path)
  # ==========================================================================
  clinical-tests:
    name: Clinical Services Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Run clinical services tests
        run: npm run test -- --project clinical-services --coverage
        working-directory: packages/clinical-services
        
      - name: Verify red flag coverage
        run: |
          echo "Verifying critical red flag detection tests..."
          npm run test -- packages/clinical-services/__tests__/red-flag-evaluator.test.ts
          
      - name: Verify differential diagnosis
        run: |
          echo "Verifying differential diagnosis tests..."
          npm run test -- packages/clinical-services/__tests__/differential-diagnosis.test.ts

  # ==========================================================================
  # BUILD APPLICATIONS
  # ==========================================================================
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [unit-tests, clinical-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Build shared packages
        run: npm run build --workspace=apps/shared || true
        
      - name: Build Provider Portal
        run: npm run build --workspace=apps/provider-portal
        env:
          NEXT_TELEMETRY_DISABLED: 1
          
      - name: Build Patient Portal
        run: npm run build --workspace=apps/patient-portal
        env:
          NEXT_TELEMETRY_DISABLED: 1
          
      - name: Upload Provider Portal Build
        uses: actions/upload-artifact@v4
        with:
          name: provider-portal-build
          path: apps/provider-portal/.next
          retention-days: 7
          
      - name: Upload Patient Portal Build
        uses: actions/upload-artifact@v4
        with:
          name: patient-portal-build
          path: apps/patient-portal/.next
          retention-days: 7

  # ==========================================================================
  # DOCKER BUILD (Only on main/develop)
  # ==========================================================================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata for Provider Portal
        id: meta-provider
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/provider-portal
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            
      - name: Build and push Provider Portal
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/provider-portal/Dockerfile
          push: true
          tags: ${{ steps.meta-provider.outputs.tags }}
          labels: ${{ steps.meta-provider.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Extract metadata for Patient Portal
        id: meta-patient
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/patient-portal
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            
      - name: Build and push Patient Portal
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/patient-portal/Dockerfile
          push: true
          tags: ${{ steps.meta-patient.outputs.tags }}
          labels: ${{ steps.meta-patient.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Extract metadata for WebSocket Service
        id: meta-websocket
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/websocket
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            
      - name: Build and push WebSocket Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/websocket/Dockerfile
          push: true
          tags: ${{ steps.meta-websocket.outputs.tags }}
          labels: ${{ steps.meta-websocket.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # E2E TESTS (On PR to main)
  # ==========================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: attending
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: attending_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        
      - name: Setup database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://attending:test_password@localhost:5432/attending_test
          
      - name: Seed test data
        run: npx prisma db seed
        env:
          DATABASE_URL: postgresql://attending:test_password@localhost:5432/attending_test
          
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://attending:test_password@localhost:5432/attending_test
          NEXTAUTH_SECRET: test-secret-min-32-characters
          DEV_BYPASS_AUTH: true
          
      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ==========================================================================
  # SECURITY SCAN
  # ==========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          
      - name: Run npm audit
        run: npm audit --audit-level=high || true
