name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'

defaults:
  run:
    working-directory: apps/mobile

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
        continue-on-error: true

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./coverage

      - name: Check coverage thresholds
        run: |
          echo "Coverage thresholds: 60% lines, 50% branches, 60% functions"
          npm run test:coverage -- --ci 2>&1 | tail -20

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-coverage
          path: apps/mobile/coverage/
          retention-days: 7

  eas-preview:
    name: EAS Preview Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview (Android)
        run: eas build --profile preview --platform android --non-interactive

      - name: Build preview (iOS)
        run: eas build --profile preview --platform ios --non-interactive
