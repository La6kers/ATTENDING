# Deploy COMPASS Standalone to Azure Web App
# Builds only apps/compass-standalone from the monorepo

name: Build and deploy COMPASS Standalone to Azure Web App

on:
  push:
    branches:
      - mockup-2
    paths:
      - 'apps/compass-standalone/**'
      - 'apps/shared/**'
      - '.github/workflows/mockup-2_attending-compass.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build compass-standalone
        run: npm run build --workspace=apps/compass-standalone
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Prepare standalone output for deployment
        run: |
          # The standalone output for a monorepo app lives at:
          # .next/standalone/apps/compass-standalone/  (server.js + .next/ + pages/)
          # .next/standalone/node_modules/             (minimal node_modules)
          #
          # We flatten this so server.js is at the deploy root with .next next to it
          STANDALONE=apps/compass-standalone/.next/standalone
          APP_DIR=$STANDALONE/apps/compass-standalone

          mkdir -p deploy

          # Copy server.js and .next build output
          cp $APP_DIR/server.js deploy/
          cp $APP_DIR/package.json deploy/
          cp -r $APP_DIR/.next deploy/.next
          cp -r $APP_DIR/pages deploy/pages 2>/dev/null || true

          # Copy static assets into .next/static
          cp -r apps/compass-standalone/.next/static deploy/.next/static

          # Copy node_modules from standalone root
          cp -r $STANDALONE/node_modules deploy/node_modules

          # Copy public folder
          if [ -d "apps/compass-standalone/public" ]; then
            cp -r apps/compass-standalone/public deploy/public
          fi

          # Debug: verify structure
          echo "=== Deploy structure ==="
          ls -la deploy/
          echo "=== .next contents ==="
          ls deploy/.next/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: compass-standalone
          path: ./deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: compass-standalone

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CEDB13C2662A4FF98341AE951F77BF78 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DBCC7AEA5F274322940C4DC6E34C0065 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7D6F23FEE8394D3AA6B27C04B79E7FEB }}

      - name: Set Azure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'attending-compass'
          app-settings-json: |
            [
              { "name": "PORT", "value": "8080" },
              { "name": "HOSTNAME", "value": "0.0.0.0" },
              { "name": "NEXT_TELEMETRY_DISABLED", "value": "1" },
              { "name": "NODE_ENV", "value": "production" }
            ]

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'attending-compass'
          slot-name: 'Production'
          package: .
          startup-command: 'node server.js'
