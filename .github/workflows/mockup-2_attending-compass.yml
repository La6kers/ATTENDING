# Deploy COMPASS Standalone to Azure Web App
# Builds only apps/compass-standalone from the monorepo

name: Build and deploy COMPASS Standalone to Azure Web App

on:
  push:
    branches:
      - mockup-2
    paths:
      - 'apps/compass-standalone/**'
      - 'apps/shared/**'
      - '.github/workflows/mockup-2_attending-compass.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build compass-standalone
        run: npm run build --workspace=apps/compass-standalone
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Prepare standalone output for deployment
        run: |
          # Next.js standalone output includes server.js + minimal node_modules
          cp -r apps/compass-standalone/.next/standalone ./deploy
          cp -r apps/compass-standalone/.next/static ./deploy/apps/compass-standalone/.next/static
          # Copy public folder if it exists
          if [ -d "apps/compass-standalone/public" ]; then
            cp -r apps/compass-standalone/public ./deploy/apps/compass-standalone/public
          fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: compass-standalone
          path: ./deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: compass-standalone

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CEDB13C2662A4FF98341AE951F77BF78 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DBCC7AEA5F274322940C4DC6E34C0065 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7D6F23FEE8394D3AA6B27C04B79E7FEB }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'attending-compass'
          slot-name: 'Production'
          package: .
          startup-command: 'node apps/compass-standalone/server.js'
