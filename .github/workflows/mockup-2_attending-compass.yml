# Deploy COMPASS Standalone to Azure Web App
# Builds only apps/compass-standalone from the monorepo

name: Build and deploy COMPASS Standalone to Azure Web App

on:
  push:
    branches:
      - mockup-2
    paths:
      - 'apps/compass-standalone/**'
      - 'apps/shared/**'
      - '.github/workflows/mockup-2_attending-compass.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build compass-standalone
        run: npm run build --workspace=apps/compass-standalone
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Prepare standalone output for deployment
        run: |
          # Keep the monorepo structure — Next.js hardcodes relativeAppDir
          STANDALONE=apps/compass-standalone/.next/standalone

          # The standalone output already has the correct structure:
          # standalone/apps/compass-standalone/server.js
          # standalone/apps/compass-standalone/.next/
          # standalone/node_modules/

          # Copy static assets into the nested .next
          mkdir -p $STANDALONE/apps/compass-standalone/.next/static
          cp -r apps/compass-standalone/.next/static $STANDALONE/apps/compass-standalone/.next/

          # Copy public folder
          if [ -d "apps/compass-standalone/public" ]; then
            cp -r apps/compass-standalone/public $STANDALONE/apps/compass-standalone/public
          fi

          # Create a root startup script that enters the app dir
          cat > $STANDALONE/startup.sh << 'SCRIPT'
          #!/bin/sh
          cd /home/site/wwwroot/apps/compass-standalone
          node server.js
          SCRIPT
          chmod +x $STANDALONE/startup.sh

          echo "=== Deploy structure ==="
          ls -la $STANDALONE/
          ls -la $STANDALONE/apps/compass-standalone/
          ls $STANDALONE/apps/compass-standalone/.next/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: compass-standalone
          path: apps/compass-standalone/.next/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: compass-standalone

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CEDB13C2662A4FF98341AE951F77BF78 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DBCC7AEA5F274322940C4DC6E34C0065 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7D6F23FEE8394D3AA6B27C04B79E7FEB }}

      - name: Set Azure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'attending-compass'
          app-settings-json: |
            [
              { "name": "PORT", "value": "8080" },
              { "name": "HOSTNAME", "value": "0.0.0.0" },
              { "name": "NEXT_TELEMETRY_DISABLED", "value": "1" },
              { "name": "NODE_ENV", "value": "production" }
            ]

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'attending-compass'
          slot-name: 'Production'
          package: .
          startup-command: 'cd /home/site/wwwroot/apps/compass-standalone && node server.js'
