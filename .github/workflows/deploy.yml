# ============================================================
# ATTENDING AI - Deploy to Azure
# .github/workflows/deploy.yml
#
# Builds Docker images for all 3 services and deploys to Azure
# App Service. Triggered on push to main (production) or
# develop (staging), or manual dispatch.
# ============================================================

name: Deploy to Azure

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/attending

jobs:
  # ========================================================
  # Determine environment
  # ========================================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  # ========================================================
  # Build & push Docker images
  # ========================================================
  build:
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: provider-portal
            dockerfile: apps/provider-portal/Dockerfile
          - service: patient-portal
            dockerfile: apps/patient-portal/Dockerfile
          - service: orders-api
            dockerfile: backend/Dockerfile
            context: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ needs.setup.outputs.environment }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================================
  # Deploy to Azure App Service
  # ========================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [setup, build]
    environment: ${{ needs.setup.outputs.environment }}

    strategy:
      matrix:
        include:
          - service: provider-portal
            azure_app: attending-${{ needs.setup.outputs.environment }}-provider
          - service: patient-portal
            azure_app: attending-${{ needs.setup.outputs.environment }}-patient
          - service: orders-api
            azure_app: attending-${{ needs.setup.outputs.environment }}-api

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ${{ matrix.service }} to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.azure_app }}
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}

  # ========================================================
  # Run database migrations (Prisma)
  # ========================================================
  migrate:
    runs-on: ubuntu-latest
    needs: [setup, build]
    environment: ${{ needs.setup.outputs.environment }}
    if: contains(github.event.head_commit.message, '[migrate]') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ========================================================
  # Post-deploy verification
  # ========================================================
  verify:
    runs-on: ubuntu-latest
    needs: [setup, deploy]
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Health check — Provider Portal
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://attending-${{ needs.setup.outputs.environment }}-provider.azurewebsites.net/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Provider Portal healthy"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "❌ Provider Portal health check failed"
          exit 1

      - name: Health check — Patient Portal
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://attending-${{ needs.setup.outputs.environment }}-patient.azurewebsites.net/api/health" || echo "000")
          [ "$STATUS" = "200" ] && echo "✅ Patient Portal healthy" || echo "⚠️ Patient Portal returned $STATUS"

      - name: Health check — Orders API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://attending-${{ needs.setup.outputs.environment }}-api.azurewebsites.net/health/live" || echo "000")
          [ "$STATUS" = "200" ] && echo "✅ Orders API healthy" || echo "⚠️ Orders API returned $STATUS"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Provider Portal | https://attending-${{ needs.setup.outputs.environment }}-provider.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
          echo "| Patient Portal | https://attending-${{ needs.setup.outputs.environment }}-patient.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
          echo "| Orders API | https://attending-${{ needs.setup.outputs.environment }}-api.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
