# ============================================================
# ATTENDING AI — Deploy to Azure (Blue-Green)
# .github/workflows/deploy.yml
#
# Flow:
#   1. build       — Docker images for all 3 services, push to GHCR
#   2. migrate     — EF Core migrations + Prisma push on staging DB
#   3. deploy      — Push images to the STAGING slot of each App Service
#   4. smoke       — k6 smoke test against staging slot URLs
#   5. swap        — Swap staging → production (zero-downtime)
#   6. verify      — Health-check production URLs, write job summary
#
# Triggered:
#   - Push to main  → production environment
#   - Push to develop → staging environment (no production swap)
#   - Manual dispatch → choose environment
#
# Required secrets (set in GitHub → Settings → Environments):
#   AZURE_CREDENTIALS       — Service principal JSON (az ad sp create-for-rbac)
#   AZURE_RESOURCE_GROUP    — e.g. rg-attending-staging
#   SMOKE_API_TOKEN         — Bearer token for a read-only staging service account
# ============================================================

name: Deploy to Azure

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY:      ghcr.io
  IMAGE_PREFIX:  ghcr.io/${{ github.repository_owner }}/attending
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

# ============================================================
# 0. Determine target environment
# ============================================================
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      app_prefix:  ${{ steps.env.outputs.app_prefix }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "app_prefix=attending-${ENV}" >> $GITHUB_OUTPUT

# ============================================================
# 1. Build Docker images and push to GHCR
# ============================================================
  build:
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: provider-portal
            dockerfile: apps/provider-portal/Dockerfile
            context: .
          - service: patient-portal
            dockerfile: apps/patient-portal/Dockerfile
            context: .
          - service: orders-api
            dockerfile: backend/Dockerfile
            context: backend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ needs.setup.outputs.environment }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

# ============================================================
# 2. Database migrations
#    a) EF Core — .NET backend (always runs; idempotent)
#    b) Prisma   — Next.js portals (runs on demand or always)
# ============================================================
  migrate:
    runs-on: ubuntu-latest
    needs: [setup, build]
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      # ---- EF Core ----
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Run EF Core migrations
        working-directory: backend
        run: |
          dotnet ef database update \
            --project src/ATTENDING.Infrastructure \
            --startup-project src/ATTENDING.Orders.Api \
            --no-build \
            --connection "${{ secrets.ATTENDING_DB_CONNECTION }}"
        env:
          ASPNETCORE_ENVIRONMENT: ${{ needs.setup.outputs.environment == 'production' && 'Production' || 'Staging' }}

      # ---- Prisma ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

# ============================================================
# 3. Deploy to STAGING SLOT of each App Service
#    (production traffic is not touched yet)
# ============================================================
  deploy-slot:
    runs-on: ubuntu-latest
    needs: [setup, build, migrate]
    environment: ${{ needs.setup.outputs.environment }}

    strategy:
      matrix:
        include:
          - service:  provider-portal
            app_name: app-${{ needs.setup.outputs.app_prefix }}-provider
          - service:  patient-portal
            app_name: app-${{ needs.setup.outputs.app_prefix }}-patient
          - service:  orders-api
            app_name: app-${{ needs.setup.outputs.app_prefix }}-api

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ${{ matrix.service }} to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name:  ${{ matrix.app_name }}
          slot-name: staging
          images:    ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}

      - name: Wait for staging slot to warm up
        run: sleep 30

# ============================================================
# 4. Smoke test against the STAGING SLOT
#    Any threshold failure aborts the pipeline before swap.
# ============================================================
  smoke:
    runs-on: ubuntu-latest
    needs: [setup, deploy-slot]
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Run smoke test against staging slot
        run: |
          k6 run \
            -e BASE_URL=https://app-${{ needs.setup.outputs.app_prefix }}-api-staging.azurewebsites.net \
            -e API_TOKEN=${{ secrets.SMOKE_API_TOKEN }} \
            infrastructure/load-testing/smoke.js

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ github.sha }}
          path: smoke-results.json
          retention-days: 30

# ============================================================
# 5. Swap staging slot → production (zero-downtime)
#    Only runs if smoke tests passed.
# ============================================================
  swap:
    runs-on: ubuntu-latest
    needs: [setup, smoke]
    environment: ${{ needs.setup.outputs.environment }}

    strategy:
      matrix:
        app_suffix: [provider, patient, api]

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging → production for ${{ matrix.app_suffix }}
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name app-${{ needs.setup.outputs.app_prefix }}-${{ matrix.app_suffix }} \
            --slot staging \
            --target-slot production

# ============================================================
# 6. Verify production health + write job summary
# ============================================================
  verify:
    runs-on: ubuntu-latest
    needs: [setup, swap]
    environment: ${{ needs.setup.outputs.environment }}
    if: always()

    steps:
      - name: Health check — Orders API (readiness)
        id: api_health
        run: |
          URL="https://app-${{ needs.setup.outputs.app_prefix }}-api.azurewebsites.net/health/ready"
          for i in {1..10}; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "status=healthy" >> $GITHUB_OUTPUT
              echo "✅ Orders API healthy ($URL)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "status=unhealthy" >> $GITHUB_OUTPUT
          echo "❌ Orders API health check failed — consider rollback"
          exit 1

      - name: Health check — Provider Portal
        run: |
          URL="https://app-${{ needs.setup.outputs.app_prefix }}-provider.azurewebsites.net/api/health"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          [ "$STATUS" = "200" ] && echo "✅ Provider Portal healthy" || echo "⚠️  Provider Portal returned $STATUS"

      - name: Health check — Patient Portal
        run: |
          URL="https://app-${{ needs.setup.outputs.app_prefix }}-patient.azurewebsites.net/api/health"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          [ "$STATUS" = "200" ] && echo "✅ Patient Portal healthy" || echo "⚠️  Patient Portal returned $STATUS"

      - name: Write deployment summary
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          PREFIX="app-${{ needs.setup.outputs.app_prefix }}"
          {
            echo "## 🚀 Deploy Complete — ${ENV}"
            echo ""
            echo "| Service | URL |"
            echo "|---------|-----|"
            echo "| Provider Portal | https://${PREFIX}-provider.azurewebsites.net |"
            echo "| Patient Portal  | https://${PREFIX}-patient.azurewebsites.net |"
            echo "| Orders API      | https://${PREFIX}-api.azurewebsites.net |"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Actor:** ${{ github.actor }}"
            echo "**Triggered by:** ${{ github.event_name }}"
          } >> $GITHUB_STEP_SUMMARY

# ============================================================
# Rollback instructions (manual — not automated)
# ============================================================
# If production breaks after swap:
#
#   az webapp deployment slot swap \
#     --resource-group <rg> \
#     --name app-attending-<env>-api \
#     --slot staging \
#     --target-slot production
#
# This swaps back instantly because the old code is still
# sitting in the staging slot.
# ============================================================
