# ============================================================
# ATTENDING AI - CI Pipeline
# .github/workflows/ci.yml
#
# Runs on every push and PR to main/mockup-2:
#   1. Lint & typecheck
#   2. Unit + integration tests
#   3. Build verification
#   4. Security audit
# ============================================================

name: CI

on:
  push:
    branches: [main, mockup-2]
  pull_request:
    branches: [main, mockup-2]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Test environment
  DATABASE_URL: 'postgresql://attending:test_password@localhost:5432/attending_test'
  REDIS_URL: 'redis://localhost:6379'
  NEXTAUTH_SECRET: 'ci-test-secret-must-be-at-least-32-characters'
  NEXTAUTH_URL: 'http://localhost:3000'
  NODE_ENV: 'test'

jobs:
  # ========================================================
  # LINT & TYPECHECK
  # ========================================================
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: false

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Don't block on lint for now

  # ========================================================
  # UNIT + INTEGRATION TESTS
  # ========================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: attending
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: attending_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Push schema to test database
        run: npx prisma db push --schema=prisma/schema.prisma --skip-generate

      - name: Run unit & integration tests
        run: npm run test:run -- --reporter=verbose

      - name: Run test coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ========================================================
  # BUILD VERIFICATION
  # ========================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Build provider portal
        run: npm run build:provider
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build patient portal
        run: npm run build:patient
        env:
          NEXT_TELEMETRY_DISABLED: 1
        continue-on-error: true  # Patient portal may have unresolved deps

      - name: Check build output size
        run: |
          echo "=== Provider Portal Build ==="
          du -sh apps/provider-portal/.next/ 2>/dev/null || echo "No build output"
          echo ""
          echo "=== Standalone size ==="
          du -sh apps/provider-portal/.next/standalone/ 2>/dev/null || echo "No standalone output"

  # ========================================================
  # SECURITY AUDIT
  # ========================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          # Check for common secret patterns
          FOUND=0
          grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.ts" --include="*.js" --include="*.json" . && FOUND=1 || true
          grep -rn "-----BEGIN.*PRIVATE KEY-----" --include="*.ts" --include="*.js" --include="*.pem" . && FOUND=1 || true
          grep -rn "sk-[a-zA-Z0-9]\{20,\}" --include="*.ts" --include="*.js" . && FOUND=1 || true
          if [ "$FOUND" = "1" ]; then
            echo "::warning::Potential secrets detected in source code!"
          else
            echo "✓ No obvious secrets found"
          fi

      - name: Verify security configurations
        run: |
          echo "Checking security configurations..."
          
          # Check that DEV_BYPASS_AUTH is not hardcoded to true
          if grep -rn "DEV_BYPASS_AUTH.*=.*true" --include="*.ts" --include="*.js" --include="*.yml" .; then
            echo "::warning::DEV_BYPASS_AUTH=true found in source files"
          fi
          
          # Check for unsafe-eval in production CSP
          if grep -rn "unsafe-eval" apps/provider-portal/middleware.ts | grep -v "dev\|development\|isProduction"; then
            echo "::warning::unsafe-eval may be present in production CSP"
          fi
          
          echo "✓ Security checks passed"

  # ========================================================
  # DOCKER BUILD TEST
  # ========================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f apps/provider-portal/Dockerfile \
            -t attending-provider:ci-${{ github.sha }} \
            .

      - name: Verify image size
        run: |
          SIZE=$(docker image inspect attending-provider:ci-${{ github.sha }} --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 500 ]; then
            echo "::warning::Docker image exceeds 500MB ($SIZE_MB MB)"
          fi
