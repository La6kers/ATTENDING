# =============================================================
# ATTENDING AI — Blue-Green Deployment (Azure App Service Slots)
#
# Deploys to a staging slot, runs smoke tests, then performs
# a zero-downtime slot swap to production.
#
# Prerequisites (set in GitHub repo secrets):
#   AZURE_CREDENTIALS         - Service principal JSON (az ad sp create-for-rbac)
#   AZURE_RESOURCE_GROUP      - e.g. attending-prod-rg
#   AZURE_APP_SERVICE_NAME    - e.g. attending-api
#   REGISTRY_LOGIN_SERVER     - e.g. attendingcr.azurecr.io
#   REGISTRY_USERNAME         - ACR admin username
#   REGISTRY_PASSWORD         - ACR admin password
#   ACR_NAME                  - e.g. attendingcr
#   STAGING_URL               - e.g. https://attending-api-staging.azurewebsites.net
#   PRODUCTION_URL            - e.g. https://attending-api.azurewebsites.net
# =============================================================
name: Blue-Green Deploy

# NOTE: Push-to-main deployments are handled by deploy.yml (full-stack blue-green).
# This workflow is manual-only for targeted backend-only deployments via ACR.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging-only]
      confirm_swap:
        description: 'Confirm slot swap to production (set to true)'
        required: true
        default: 'false'

env:
  DOTNET_VERSION: '8.0.x'
  IMAGE_NAME: attending-api
  SLOT_NAME: staging

jobs:
  # ── Stage 1: Build & push Docker image ──────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push
        run: |
          docker build \
            --tag ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            --tag ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # ── Stage 2: Run backend tests ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & build
        run: dotnet build --configuration Release

      - name: Unit + Integration Tests (InMemory — no Docker required)
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --filter "Category!=Docker" \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Blue-Green Deploy Tests
          path: backend/**/test-results.trx
          reporter: dotnet-trx

  # ── Stage 3: Deploy to staging slot ────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging Slot
    runs-on: ubuntu-latest
    needs: [build, test]
    environment:
      name: staging
      url: ${{ secrets.STAGING_URL }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          images: '${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}'

      - name: Wait for staging slot to warm up
        run: sleep 30

      - name: Smoke test — staging health/live
        run: |
          curl --retry 5 --retry-delay 5 --retry-connrefused \
            -f "${{ secrets.STAGING_URL }}/health/live" \
            || (echo "Staging health check failed — aborting swap" && exit 1)

      - name: Smoke test — staging health/ready
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.STAGING_URL }}/health/ready")
          echo "Staging /health/ready returned $STATUS"
          if [[ "$STATUS" != "200" && "$STATUS" != "503" ]]; then
            echo "Unexpected status $STATUS from /health/ready — aborting swap"
            exit 1
          fi

      - name: Smoke test — API version endpoint
        run: |
          RESPONSE=$(curl -s "${{ secrets.STAGING_URL }}/api/v1/system/version")
          echo "$RESPONSE" | grep -q "apiVersion" \
            || (echo "Version endpoint check failed — aborting swap" && exit 1)

      - name: Smoke test — clinical ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.STAGING_URL }}/api/v1/system/ping")
          if [[ "$STATUS" != "200" ]]; then
            echo "Clinical ping returned $STATUS — aborting swap"
            exit 1
          fi

  # ── Stage 4: Slot swap (blue → green) ───────────────────────────────────
  swap:
    name: Slot Swap → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.confirm_swap == 'true' &&
      github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging → production
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_APP_SERVICE_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --target-slot production

      - name: Wait for production to stabilize
        run: sleep 20

      - name: Post-swap health check — production
        run: |
          curl --retry 5 --retry-delay 5 --retry-connrefused \
            -f "${{ secrets.PRODUCTION_URL }}/health/live" \
            || (echo "Production health check failed after swap — initiating rollback" && exit 1)

      - name: Verify production version matches deployed commit
        run: |
          RESP=$(curl -s "${{ secrets.PRODUCTION_URL }}/api/v1/system/version")
          echo "Production version response: $RESP"

  # ── Stage 5: Rollback on failure ────────────────────────────────────────
  rollback:
    name: Rollback (Swap Back)
    runs-on: ubuntu-latest
    needs: swap
    if: failure() && needs.swap.result == 'failure'
    environment:
      name: production

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap back — production → staging (rollback)
        run: |
          echo "Post-swap health check failed — rolling back to previous production"
          az webapp deployment slot swap \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_APP_SERVICE_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --target-slot production

      - name: Verify rollback health
        run: |
          sleep 20
          curl --retry 3 --retry-delay 5 \
            -f "${{ secrets.PRODUCTION_URL }}/health/live" \
            && echo "Rollback successful — previous version is live" \
            || echo "WARNING: Rollback health check also failed — manual intervention required"
