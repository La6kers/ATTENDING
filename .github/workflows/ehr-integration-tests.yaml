# ============================================================
# ATTENDING AI - EHR Integration Tests Workflow
# .github/workflows/ehr-integration-tests.yaml
#
# Runs FHIR/EHR integration tests on push and PR
# ============================================================

name: EHR Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/fhir/**'
      - 'apps/*/lib/fhir/**'
      - '.github/workflows/ehr-integration-tests.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/fhir/**'
      - 'apps/*/lib/fhir/**'
  workflow_dispatch:
    inputs:
      run_sandbox_tests:
        description: 'Run sandbox E2E tests'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: packages/fhir

jobs:
  # =====================================================
  # UNIT TESTS
  # =====================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ${{ env.WORKING_DIRECTORY }}/coverage/
          retention-days: 7

  # =====================================================
  # CONTRACT TESTS
  # =====================================================
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm run test:contracts
        working-directory: ${{ env.WORKING_DIRECTORY }}

  # =====================================================
  # INTEGRATION TESTS
  # =====================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        working-directory: ${{ env.WORKING_DIRECTORY }}

  # =====================================================
  # COVERAGE REPORT
  # =====================================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, contract-tests, integration-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ env.WORKING_DIRECTORY }}/coverage/lcov.info
          flags: fhir
          name: fhir-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.WORKING_DIRECTORY }}/coverage/
          retention-days: 30

  # =====================================================
  # SANDBOX E2E TESTS (Optional)
  # =====================================================
  sandbox-tests:
    name: Sandbox E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, contract-tests, integration-tests]
    if: |
      github.ref == 'refs/heads/main' ||
      github.event.inputs.run_sandbox_tests == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Epic sandbox tests
        run: npm run test:epic
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          EPIC_SANDBOX_CLIENT_ID: ${{ secrets.EPIC_SANDBOX_CLIENT_ID }}
          EPIC_REDIRECT_URI: ${{ secrets.EPIC_REDIRECT_URI }}
        continue-on-error: true

      - name: Run Oracle sandbox tests
        run: npm run test:oracle
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          ORACLE_SANDBOX_CLIENT_ID: ${{ secrets.ORACLE_SANDBOX_CLIENT_ID }}
          ORACLE_TENANT_ID: ${{ secrets.ORACLE_TENANT_ID }}
          ORACLE_REDIRECT_URI: ${{ secrets.ORACLE_REDIRECT_URI }}
        continue-on-error: true

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: ${{ env.WORKING_DIRECTORY }}/reports/
          retention-days: 7

  # =====================================================
  # TYPE CHECK
  # =====================================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        working-directory: ${{ env.WORKING_DIRECTORY }}

  # =====================================================
  # LINT
  # =====================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        working-directory: ${{ env.WORKING_DIRECTORY }}

  # =====================================================
  # SUMMARY
  # =====================================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, contract-tests, integration-tests, coverage, typecheck, lint]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "## EHR Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Tests | ${{ needs.contract-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any test failed
        if: |
          needs.unit-tests.result == 'failure' ||
          needs.contract-tests.result == 'failure' ||
          needs.integration-tests.result == 'failure' ||
          needs.typecheck.result == 'failure' ||
          needs.lint.result == 'failure'
        run: exit 1
